<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Button Flow Builder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo-dot"></span> Flow Builder</h1>
    </div>

    <div class="sidebar-body">

      <!-- Create Button -->
      <div class="panel">
        <div class="panel-head">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Create button
        </div>
        <div class="panel-body">
          <div class="field">
            <label>Name</label>
            <input type="text" id="btn-name" placeholder="e.g. btn1" autocomplete="off" />
          </div>
          <div class="field">
            <label>Function body (Python)</label>
            <textarea id="btn-fn" placeholder='print("hello world")'></textarea>
          </div>
          <button class="btn btn-accent btn-full" onclick="createButton()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add button
          </button>
          <div>
            <div style="font-size:11px;color:var(--text2);margin-bottom:6px;">Registered buttons</div>
            <div class="chip-list" id="node-chips">
              <span style="font-size:11px;color:var(--text3);font-style:italic;">None yet</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Create Edge -->
      <div class="panel">
        <div class="panel-head">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          Create edge
        </div>
        <div class="panel-body">
          <div class="row">
            <div class="field">
              <label>From</label>
              <select id="edge-from"><option value="">— select —</option></select>
            </div>
            <div class="field">
              <label>To</label>
              <select id="edge-to"><option value="">— select —</option></select>
            </div>
          </div>
          <button class="btn btn-accent btn-full" onclick="createEdge()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            Connect
          </button>
          <div id="edge-list" style="display:flex;flex-direction:column;gap:5px;">
            <span style="font-size:11px;color:var(--text3);font-style:italic;">No edges yet</span>
          </div>
        </div>
      </div>

      <!-- Trigger Node -->
      <div class="panel">
        <div class="panel-head">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Trigger node
        </div>
        <div class="panel-body">
          <div class="field">
            <label>Starting node</label>
            <select id="trigger-sel"><option value="">— select —</option></select>
          </div>
          <button class="btn btn-accent btn-full" onclick="setTrigger()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Set as trigger
          </button>
          <div id="trigger-display" style="font-size:12px;color:var(--text3);font-style:italic;padding:2px 0;">Not set</div>
        </div>
      </div>

      <!-- Execute -->
      <button class="btn btn-green btn-full execute-btn" onclick="executeFlow()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Execute flow
      </button>

    </div><!-- sidebar-body -->

    <!-- API config -->
    <div class="api-cfg">
      <span class="conn-indicator disconnected" id="conn-dot" title="Backend connection status"></span>
      <input type="text" id="api-base" value="http://localhost:8000" placeholder="FastAPI base URL" />
      <button class="btn btn-accent" onclick="pingBackend()" style="padding:6px 10px;font-size:12px;">Ping</button>
    </div>
  </aside>

  <!-- ===== MAIN / REFLECTOR ===== -->
  <main class="main">
    <div class="main-header">
      <h2>Live state reflector</h2>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="sync-badge" class="status-badge" style="background:var(--bg2);border:1px solid var(--border);font-size:11px;color:var(--text2);">
          <span class="status-dot" style="background:var(--text3);"></span>
          Idle
        </span>
        <button class="btn" onclick="syncFromBackend()" style="font-size:12px;padding:5px 10px;color:var(--text2);">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
          Sync
        </button>
      </div>
    </div>

    <div class="main-body">

      <!-- State pane -->
      <div class="state-pane">
        <div class="pane-head">
          Buttons state
          <span class="pane-count" id="btn-count">0</span>
        </div>
        <div class="state-scroll" id="state-scroll">
          <div class="empty">
            <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" opacity="0.4"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            No buttons registered yet
          </div>
        </div>
      </div>

      <!-- Log pane -->
      <div class="log-pane">
        <div class="pane-head">
          Activity log
          <button onclick="clearLog()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0;">Clear</button>
        </div>
        <div class="log-scroll" id="log-scroll"></div>
      </div>

    </div>
  </main>

</div><!-- app -->

<div class="toast" id="toast"></div>
<script src="./script.js"></script>
</body>
</html>
